<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Test — nunu</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 3rem; font-family: system-ui, sans-serif; padding: 3rem; background: #f5f5f5; }
        .row { display: flex; align-items: flex-start; gap: 4rem; flex-wrap: wrap; justify-content: center; }
        .box { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
        .box label { font-size: 0.65rem; color: #999; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
        .dark { background: #0a0a0a; padding: 2rem 3rem; border-radius: 16px; display: flex; align-items: center; justify-content: center; }
        .light { background: #fff; padding: 2rem 3rem; border-radius: 16px; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; }
        h2 { font-size: 0.85rem; color: #666; letter-spacing: 0.05em; margin: 0; }
        svg { display: block; }
        .ref { max-width: 300px; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <h2>NUNU Logo — Arc-based (semicircular curves)</h2>

    <!-- Reference brand image for comparison -->
    <div class="box">
        <label>Brand reference</label>
        <img class="ref" src="../NUNU 2026/Nunu_Logo_Only.png" alt="Brand reference">
    </div>

    <div class="row">
        <div class="box">
            <label>Large — black on white</label>
            <div class="light">
                <svg viewBox="0 0 168 72" width="336" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="nunu">
                    <g stroke="#000000" stroke-width="12" stroke-linecap="round" fill="none">
                        <path d="M 8,64 V 32 A 12,12 0 0,1 32,32 V 64"/>
                        <path d="M 50,20 V 52 A 12,12 0 0,0 74,52 V 20"/>
                        <path d="M 92,64 V 32 A 12,12 0 0,1 116,32 V 64"/>
                        <path d="M 134,20 V 52 A 12,12 0 0,0 158,52 V 20"/>
                    </g>
                    <circle cx="158" cy="8" r="6" fill="#00FF00"/>
                </svg>
            </div>
        </div>
        <div class="box">
            <label>Large — white on dark</label>
            <div class="dark">
                <svg viewBox="0 0 168 72" width="336" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="nunu">
                    <g stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" fill="none">
                        <path d="M 8,64 V 32 A 12,12 0 0,1 32,32 V 64"/>
                        <path d="M 50,20 V 52 A 12,12 0 0,0 74,52 V 20"/>
                        <path d="M 92,64 V 32 A 12,12 0 0,1 116,32 V 64"/>
                        <path d="M 134,20 V 52 A 12,12 0 0,0 158,52 V 20"/>
                    </g>
                    <circle cx="158" cy="8" r="6" fill="#00FF00"/>
                </svg>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="box">
            <label>Nav size (white on dark)</label>
            <div class="dark">
                <svg viewBox="0 0 168 72" width="150" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="nunu">
                    <g stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" fill="none">
                        <path d="M 8,64 V 32 A 12,12 0 0,1 32,32 V 64"/>
                        <path d="M 50,20 V 52 A 12,12 0 0,0 74,52 V 20"/>
                        <path d="M 92,64 V 32 A 12,12 0 0,1 116,32 V 64"/>
                        <path d="M 134,20 V 52 A 12,12 0 0,0 158,52 V 20"/>
                    </g>
                    <circle cx="158" cy="8" r="6" fill="#00FF00"/>
                </svg>
            </div>
        </div>
        <div class="box">
            <label>Footer size</label>
            <div class="dark">
                <svg viewBox="0 0 168 72" width="100" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="nunu">
                    <g stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" fill="none">
                        <path d="M 8,64 V 32 A 12,12 0 0,1 32,32 V 64"/>
                        <path d="M 50,20 V 52 A 12,12 0 0,0 74,52 V 20"/>
                        <path d="M 92,64 V 32 A 12,12 0 0,1 116,32 V 64"/>
                        <path d="M 134,20 V 52 A 12,12 0 0,0 158,52 V 20"/>
                    </g>
                    <circle cx="158" cy="8" r="6" fill="#00FF00"/>
                </svg>
            </div>
        </div>
        <div class="box">
            <label>Nav + tagline</label>
            <div class="dark" style="gap:12px;">
                <svg viewBox="0 0 168 72" width="150" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="nunu">
                    <g stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" fill="none">
                        <path d="M 8,64 V 32 A 12,12 0 0,1 32,32 V 64"/>
                        <path d="M 50,20 V 52 A 12,12 0 0,0 74,52 V 20"/>
                        <path d="M 92,64 V 32 A 12,12 0 0,1 116,32 V 64"/>
                        <path d="M 134,20 V 52 A 12,12 0 0,0 158,52 V 20"/>
                    </g>
                    <circle cx="158" cy="8" r="6" fill="#00FF00"/>
                </svg>
                <span style="font-size:11px;color:#888;line-height:1.3;font-weight:500;font-family:system-ui;">advanced<br>technologies LTD</span>
            </div>
        </div>
    </div>

</body>
</html>
